name: Release

on:
  release:
    types: [published]

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ── Docker multi-arch build & push to GHCR ────────────────────────────
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_ENV

      - name: Patch version from tag
        run: sed -i "s/^version = .*/version = \"$VERSION\"/" backend/Cargo.toml

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.PUBLIC_REPO_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/akapzg/unver:${{ env.VERSION }}
            ${{ env.REGISTRY }}/akapzg/unver:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Binary builds (Linux x86_64 + aarch64 / ARM64) ───────────────────
  binaries:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            artifact: unver-linux-amd64
            display: Linux x86_64
          - target: aarch64-unknown-linux-gnu
            artifact: unver-linux-arm64
            display: Linux ARM64
          - target: x86_64-unknown-linux-musl
            artifact: unver-openwrt-amd64
            display: OpenWrt x86_64
          - target: aarch64-unknown-linux-musl
            artifact: unver-openwrt-arm64
            display: OpenWrt ARM64
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_ENV

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation deps (ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Install musl deps (x86_64)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get install -y musl-tools

      - name: Install cross (aarch64 musl)
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: cargo install cross --locked

      - name: Patch version from tag
        run: sed -i "s/^version = .*/version = \"$VERSION\"/" backend/Cargo.toml

      - name: Build backend (glibc / x86_64 musl)
        if: matrix.target != 'aarch64-unknown-linux-musl'
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_LINKER: x86_64-linux-musl-gcc
          CC_x86_64_unknown_linux_musl: x86_64-linux-musl-gcc
        run: |
          cd backend
          sudo apt-get install -y sqlite3
          DATABASE_URL="sqlite:/tmp/unver.db" sqlite3 /tmp/unver.db < migrations/001_init.sql
          cargo build --release --target ${{ matrix.target }}

      - name: Build backend (aarch64 musl via cross)
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: |
          cd backend
          sudo apt-get install -y sqlite3
          DATABASE_URL="sqlite:unver-ci.db" sqlite3 unver-ci.db < migrations/001_init.sql
          DATABASE_URL="sqlite:unver-ci.db" cross build --release --target aarch64-unknown-linux-musl

      - name: Package binary
        run: |
          mkdir -p dist
          tar -czf dist/${{ matrix.artifact }}.tar.gz \
            -C backend/target/${{ matrix.target }}/release unver

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}.tar.gz

  # ── Publish to public repo (akapzg/Unver) ────────────────────────────
  publish:
    needs: [docker, binaries]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_ENV

      - name: Download linux binary artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: unver-linux-*
          path: dist

      - name: Download openwrt binary artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: unver-openwrt-*
          path: dist

      - name: Sync public files to public repo
        run: |
          git clone https://x-access-token:${{ secrets.PUBLIC_REPO_TOKEN }}@github.com/akapzg/Unver.git /tmp/unver-public
          cp README.public.md /tmp/unver-public/README.md
          cp README.zh.md /tmp/unver-public/README.zh.md
          cp docker-compose.prod.yml /tmp/unver-public/docker-compose.prod.yml
          cp scripts/install.sh /tmp/unver-public/scripts/install.sh
          cp scripts/install-openwrt.sh /tmp/unver-public/scripts/install-openwrt.sh
          cp docs/API.md /tmp/unver-public/docs/API.md
          cp docs/API.zh.md /tmp/unver-public/docs/API.zh.md
          cp LICENSE /tmp/unver-public/LICENSE
          cd /tmp/unver-public
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add -A
          git diff --cached --quiet || git commit -m "Sync from private repo v${{ env.VERSION }}"
          git push

      - name: Create public repo release
        uses: softprops/action-gh-release@v2
        with:
          repository: akapzg/Unver
          tag_name: v${{ env.VERSION }}
          name: v${{ env.VERSION }}
          body: |
            ## Docker

            ```bash
            docker pull ghcr.io/akapzg/unver:${{ env.VERSION }}
            ```

            ## One-Click Install

            ### Linux
            ```bash
            curl -fsSL https://raw.githubusercontent.com/akapzg/Unver/main/scripts/install.sh | bash
            ```

            ### OpenWrt
            ```bash
            curl -fsSL https://raw.githubusercontent.com/akapzg/Unver/main/scripts/install-openwrt.sh | bash
            ```
          files: |
            dist/unver-linux-amd64/unver-linux-amd64.tar.gz
            dist/unver-linux-arm64/unver-linux-arm64.tar.gz
            dist/unver-openwrt-amd64/unver-openwrt-amd64.tar.gz
            dist/unver-openwrt-arm64/unver-openwrt-arm64.tar.gz
          token: ${{ secrets.PUBLIC_REPO_TOKEN }}
