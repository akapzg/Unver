name: Release

on:
  release:
    types: [published]

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ── Docker multi-arch build & push to GHCR ────────────────────────────
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_ENV

      - name: Patch version from tag
        run: sed -i "s/^version = .*/version = \"$VERSION\"/" backend/Cargo.toml

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.PUBLIC_REPO_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}:${{ env.VERSION }}
            ${{ env.REGISTRY }}/${{ github.repository }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Binary builds (Linux x86_64 + aarch64 / ARM64) ───────────────────
  binaries:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            artifact: unver-linux-amd64
            display: Linux x86_64
          - target: aarch64-unknown-linux-gnu
            artifact: unver-linux-arm64
            display: Linux ARM64
          - target: x86_64-unknown-linux-musl
            artifact: unver-openwrt-amd64
            display: OpenWrt x86_64
          - target: aarch64-unknown-linux-musl
            artifact: unver-openwrt-arm64
            display: OpenWrt ARM64
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_ENV

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation deps (ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Install musl deps (x86_64)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get install -y musl-tools

      - name: Install cross (aarch64 musl)
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: cargo install cross --locked

      - name: Patch version from tag
        run: sed -i "s/^version = .*/version = \"$VERSION\"/" backend/Cargo.toml

      - name: Build backend (glibc / x86_64 musl)
        if: matrix.target != 'aarch64-unknown-linux-musl'
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_LINKER: x86_64-linux-musl-gcc
          CC_x86_64_unknown_linux_musl: x86_64-linux-musl-gcc
        run: |
          cd backend
          sudo apt-get install -y sqlite3
          DATABASE_URL="sqlite:/tmp/unver.db" sqlite3 /tmp/unver.db < migrations/001_init.sql
          DATABASE_URL="sqlite:/tmp/unver.db" sqlite3 /tmp/unver.db < migrations/002_cert_id.sql
          DATABASE_URL="sqlite:/tmp/unver.db" sqlite3 /tmp/unver.db < migrations/003_add_cert_source.sql
          DATABASE_URL="sqlite:/tmp/unver.db" sqlite3 /tmp/unver.db < migrations/004_rename_port_groups.sql
          DATABASE_URL="sqlite:/tmp/unver.db" cargo build --release --target ${{ matrix.target }}

      - name: Build backend (aarch64 musl via cross)
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: |
          cd backend
          sudo apt-get install -y sqlite3
          DATABASE_URL="sqlite:unver-ci.db" sqlite3 unver-ci.db < migrations/001_init.sql
          DATABASE_URL="sqlite:unver-ci.db" sqlite3 unver-ci.db < migrations/002_cert_id.sql
          DATABASE_URL="sqlite:unver-ci.db" sqlite3 unver-ci.db < migrations/003_add_cert_source.sql
          DATABASE_URL="sqlite:unver-ci.db" sqlite3 unver-ci.db < migrations/004_rename_port_groups.sql
          DATABASE_URL="sqlite:unver-ci.db" cross build --release --target aarch64-unknown-linux-musl

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build frontend
        run: |
          cd frontend
          npm install
          npm run build

      - name: Package binary + static
        run: |
          mkdir -p dist pkg
          cp backend/target/${{ matrix.target }}/release/unver pkg/
          cp -r frontend/dist pkg/static
          tar -czf dist/${{ matrix.artifact }}.tar.gz -C pkg unver static

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}.tar.gz

  # ── Attach binary assets to the release ──────────────────────────────────
  release-assets:
    needs: [binaries]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Extract version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_ENV

      - name: Download linux binary artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: unver-linux-*
          path: dist

      - name: Download openwrt binary artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: unver-openwrt-*
          path: dist

      - name: Upload assets to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          files: |
            dist/unver-linux-amd64/unver-linux-amd64.tar.gz
            dist/unver-linux-arm64/unver-linux-arm64.tar.gz
            dist/unver-openwrt-amd64/unver-openwrt-amd64.tar.gz
            dist/unver-openwrt-arm64/unver-openwrt-arm64.tar.gz
          token: ${{ secrets.GITHUB_TOKEN }}
