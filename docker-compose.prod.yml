# Unver — Production Docker Deployment
#
# Default: host network (simplest, no port mapping issues).
# For port mapping, comment out network_mode and uncomment ports.
#
# First-time setup:
#   mkdir -p data
#   docker compose -f docker-compose.prod.yml up -d
#
# Upgrade:
#   docker compose -f docker-compose.prod.yml pull
#   docker compose -f docker-compose.prod.yml up -d

services:
  unver:
    image: ghcr.io/akapzg/unver:latest
    container_name: unver
    restart: unless-stopped
    network_mode: host
#   ports:                          # Use these instead of network_mode: host
#     - "80:80"                     #   HTTP → HTTPS redirect
#     - "443:8443"                  #   HTTPS proxy (Unver default 8443)
#     - "19688:19688"               #   Management UI & API
    volumes:
      - ./data:/app/data
    environment:
      - RUST_LOG=unver=info,tower_http=warn
    cap_add:
      - NET_BIND_SERVICE
